# coordinator.conf — Configuration for coordinator.sh
# <!-- V5 v2026.05.28.2 -->
#
# This file is sourced by coordinator.sh.
# All values can be overridden via environment variables (COORDINATOR_*).

# --- General Settings ---
COORDINATOR_LOG="/tmp/coordinator.log"
COORDINATOR_STATUS_DIR="/home/kafei/.openclaw/team-share"
COORDINATOR_STATUS_FILE="status.json"
COORDINATOR_HASH_FILE="/tmp/coordinator-status.hash"
COORDINATOR_LOCK_FILE="/tmp/coordinator.lock"

# --- Agent Configuration ---
COORDINATOR_AGENTS="zhugeliang caozhi simayi opencode"
COORDINATOR_POLL_INTERVAL=600
COORDINATOR_BLOCKER_TIMEOUT=30

# --- Git Configuration ---
COORDINATOR_GIT_BRANCH="main"

# --- Notification Configuration ---
# Methods: primary (openclaw agent), webhook, telegram (fallback order)
COORDINATOR_NOTIFY_METHOD="primary"

# Telegram fallback (optional — leave empty to disable)
# TELEGRAM_BOT_TOKEN=""
# TELEGRAM_CHAT_ID=""

# OpenClaw Webhook fallback (optional)
# OPENCLAW_HOST="127.0.0.1"
# OPENCLAW_PORT="18789"
# OPENCLAW_HOOK_TOKEN=""

# --- Relay Configuration ---
# Workflow auto-handoff for agent task relay
# RELAY_CONF=""                                  # Path to relay.conf (default: same dir as coordinator.sh)
# RELAY_DEDUP_TTL=3600                           # Dedup entry TTL (seconds)
